<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C081D"/>
      <stop offset="100%" style="stop-color:#1A1F2E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9300f3;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9300f3;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#9300f3;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9300f3;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Center glow -->
  <rect width="800" height="400" fill="url(#centerGlow)"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1" fill="#cbacf9" opacity="0.6"/>
  <circle cx="150" cy="25" r="1.5" fill="#cbacf9" opacity="0.4"/>
  <circle cx="220" cy="55" r="1" fill="#cbacf9" opacity="0.5"/>
  <circle cx="320" cy="30" r="1" fill="#cbacf9" opacity="0.7"/>
  <circle cx="400" cy="20" r="1.5" fill="#cbacf9" opacity="0.3"/>
  <circle cx="480" cy="45" r="1" fill="#cbacf9" opacity="0.6"/>
  <circle cx="560" cy="15" r="1" fill="#cbacf9" opacity="0.5"/>
  <circle cx="640" cy="35" r="1.5" fill="#cbacf9" opacity="0.4"/>
  <circle cx="720" cy="50" r="1" fill="#cbacf9" opacity="0.6"/>
  <circle cx="760" cy="28" r="1" fill="#cbacf9" opacity="0.5"/>
  <circle cx="100" cy="70" r="1" fill="#cbacf9" opacity="0.3"/>
  <circle cx="680" cy="65" r="1" fill="#cbacf9" opacity="0.4"/>
  <circle cx="350" cy="60" r="1" fill="#cbacf9" opacity="0.5"/>

  <!-- Forest silhouette - back row (darker) -->
  <!-- Tree 1 -->
  <polygon points="30,340 55,260 80,340" fill="#0a1a0a" opacity="0.7"/>
  <polygon points="40,320 55,255 70,320" fill="#0d1f0d" opacity="0.8"/>
  <!-- Tree 2 -->
  <polygon points="70,340 100,240 130,340" fill="#0a1a0a" opacity="0.7"/>
  <polygon points="82,318 100,235 118,318" fill="#0d1f0d" opacity="0.8"/>
  <!-- Tree 3 -->
  <polygon points="120,340 155,245 190,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 4 -->
  <polygon points="170,340 200,255 230,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 5 -->
  <polygon points="220,340 260,235 300,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 6 -->
  <polygon points="280,340 315,248 350,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 7 -->
  <polygon points="340,340 375,242 410,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 8 -->
  <polygon points="400,340 440,238 480,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 9 -->
  <polygon points="460,340 498,244 536,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 10 -->
  <polygon points="520,340 558,250 596,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 11 -->
  <polygon points="580,340 618,242 656,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 12 -->
  <polygon points="640,340 678,246 716,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 13 -->
  <polygon points="700,340 738,238 776,340" fill="#0a1a0a" opacity="0.7"/>
  <!-- Tree 14 -->
  <polygon points="750,340 780,252 810,340" fill="#0a1a0a" opacity="0.7"/>

  <!-- Forest silhouette - front row (richer green) -->
  <!-- Tree A -->
  <polygon points="0,400 35,305 70,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="10,390 35,300 60,390" fill="#122e15" opacity="0.95"/>
  <!-- Tree B -->
  <polygon points="50,400 90,285 130,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="62,385 90,280 118,385" fill="#122e15" opacity="0.95"/>
  <!-- Tree C -->
  <polygon points="110,400 155,278 200,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="125,383 155,272 185,383" fill="#152f18" opacity="0.95"/>
  <!-- Tree D -->
  <polygon points="175,400 215,290 255,400" fill="#0f2a12" opacity="0.9"/>
  <!-- Tree E -->
  <polygon points="235,400 280,275 325,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="250,382 280,270 310,382" fill="#122e15" opacity="0.95"/>
  <!-- Tree F -->
  <polygon points="300,400 345,282 390,400" fill="#0f2a12" opacity="0.9"/>
  <!-- Tree G -->
  <polygon points="360,400 410,272 460,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="378,380 410,267 442,380" fill="#122e15" opacity="0.95"/>
  <!-- Tree H -->
  <polygon points="425,400 470,280 515,400" fill="#0f2a12" opacity="0.9"/>
  <!-- Tree I -->
  <polygon points="490,400 535,276 580,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="505,382 535,271 565,382" fill="#122e15" opacity="0.95"/>
  <!-- Tree J -->
  <polygon points="555,400 600,284 645,400" fill="#0f2a12" opacity="0.9"/>
  <!-- Tree K -->
  <polygon points="620,400 665,278 710,400" fill="#0f2a12" opacity="0.9"/>
  <polygon points="635,382 665,273 695,382" fill="#122e15" opacity="0.95"/>
  <!-- Tree L -->
  <polygon points="685,400 730,286 775,400" fill="#0f2a12" opacity="0.9"/>
  <!-- Tree M -->
  <polygon points="750,400 795,280 840,400" fill="#0f2a12" opacity="0.9"/>

  <!-- Ground fill -->
  <rect x="0" y="370" width="800" height="30" fill="#0a1a0a"/>

  <!-- Top gradient overlay for text readability -->
  <rect width="800" height="240" fill="url(#glow)"/>

  <!-- Purple accent line -->
  <rect x="340" y="148" width="120" height="2" rx="1" fill="#9300f3" opacity="0.8"/>

  <!-- Title text shadow -->
  <text x="400" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#0C081D" text-anchor="middle" opacity="0.4" filter="url(#blur)">Sherwood Forest</text>

  <!-- Title text -->
  <text x="400" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">Sherwood Forest</text>

  <!-- Subtitle -->
  <text x="400" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#cbacf9" text-anchor="middle" letter-spacing="2">React Native · Expo</text>

  <!-- Bottom purple accent -->
  <rect x="360" y="250" width="80" height="2" rx="1" fill="#9300f3" opacity="0.5"/>
</svg>
